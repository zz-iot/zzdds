name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      vendor_filter:
        description: '"default" = gated vendors only; "all" = every vendor in the pinned release'
        required: false
        default: default
        type: choice
        options:
          - default
          - all
      dds_rtps_ref:
        description: 'zz-iot/dds-rtps branch or tag to check out (default: pinned release tag)'
        required: false
        default: ''
        type: string
  schedule:
    # Weekly full-vendor interop sweep — Mondays 06:00 UTC
    - cron: '0 6 * * 1'

# Cancel in-progress runs for the same ref on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned omg-dds/dds-rtps release used for vendor interop binaries.
# Bump this tag when you want to pick up a new release (may change the vendor list).
#
# INTEROP_RTPS_REF: zz-iot/dds-rtps branch/tag checked out for the test harness.
# Defaults to the zenzen branch pinned to INTEROP_RELEASE_TAG; override via the
# dds_rtps_ref workflow_dispatch input to test against a dev branch (e.g. "zenzen").
env:
  INTEROP_RELEASE_TAG: v2.1.2026
  # NOTE: When bumping INTEROP_RELEASE_TAG, also update the fallback below to match (zenzen-<new-tag>).
  INTEROP_RTPS_REF: ${{ inputs.dds_rtps_ref || 'zenzen-f88c8a4' }}

jobs:
  # ── Unit tests: Linux x86_64 (gates interop jobs below) ───────────────────
  test-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Run deterministic matrix
        run: python3 scripts/run_deterministic_matrix.py --include-tsan

  # ── Unit tests: remaining platforms (independent of interop) ──────────────
  test-other:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS ARM64
            os: macos-latest
          - name: Windows x86_64
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Allow inbound UDP (Windows)
        if: runner.os == 'Windows'
        run: netsh advfirewall firewall add rule name="zzdds-test-udp" protocol=UDP dir=in action=allow

      - name: Test
        run: zig build test

  # ── Coverage ──────────────────────────────────────────────────────────────
  #
  # Builds all test binaries to zig-out/tests/, runs each through kcov
  # (DWARF-based instrumentation — no compiler changes needed), and uploads
  # the merged cobertura.xml to Codecov.
  #
  # Runs on the same trigger as the test jobs; gated on test-linux so coverage
  # only uploads when the suite is green.

  coverage:
    name: Coverage
    needs: test-linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Cache kcov and patched elfutils
        id: cache-kcov
        uses: actions/cache@v4
        with:
          path: |
            /tmp/kcov-src
            /tmp/kcov-build
            /tmp/elfutils-patched
          key: kcov-v42-elfutils-uleb128-${{ runner.os }}

      - name: Install kcov build and runtime dependencies
        if: steps.cache-kcov.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            binutils-dev libdw-dev libcurl4-openssl-dev \
            zlib1g-dev libiberty-dev cmake libcurl4

      - name: Build patched elfutils and kcov
        if: steps.cache-kcov.outputs.cache-hit != 'true'
        run: |
          # Patch elfutils 0.195: fix extended opcode length to use ULEB128
          # (DWARF spec 6.2.5.3).  Zig 0.16.0 emits vendor extended opcodes
          # with body length >= 128; libdw reads only the first ULEB byte,
          # misidentifies the sub-opcode, and misparses the rest of the stream.
          cd /tmp
          wget -q https://sourceware.org/elfutils/ftp/0.195/elfutils-0.195.tar.bz2
          echo "37629fdf7f1f3dc2818e138fca2b8094177d6c2d0f701d3bb650a561218dc026  elfutils-0.195.tar.bz2" | sha256sum --check
          tar xjf elfutils-0.195.tar.bz2
          cat > /tmp/patch_elfutils.py << 'PYEOF'
          import sys
          fname = '/tmp/elfutils-0.195/libdw/dwarf_getsrclines.c'
          with open(fname) as f:
              s = f.read()
          old = '\t  if (unlikely (lineendp - linep < 2))\n\t    goto invalid_data;\n\n\t  /* The length.  */\n\t  uint_fast8_t len = *linep++;'
          new = '\t  if (unlikely (linep >= lineendp))\n\t    goto invalid_data;\n\n\t  /* Extended opcode length is ULEB128 per DWARF spec 6.2.5.3.  */\n\t  Dwarf_Word len;\n\t  get_uleb128 (len, linep, lineendp);'
          if old not in s:
              sys.exit('elfutils patch target not found')
          with open(fname, 'w') as f:
              f.write(s.replace(old, new, 1))
          print('elfutils ULEB128 fix applied')
          PYEOF
          python3 /tmp/patch_elfutils.py
          cd /tmp/elfutils-0.195
          ./configure --prefix=/tmp/elfutils-patched \
            --disable-nls --disable-debuginfod
          make -j$(nproc)
          make install
          # Build kcov linked against patched elfutils
          git clone --depth=1 --branch v42 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/elfutils-patched
          make -C /tmp/kcov-build -j$(nproc)

      - name: Install patched libdw and kcov
        run: |
          sudo install -m755 /tmp/elfutils-patched/lib/libdw-0.195.so \
            /usr/local/lib/libdw-0.195.so
          sudo ln -sf /usr/local/lib/libdw-0.195.so /usr/local/lib/libdw.so.1
          sudo ldconfig
          sudo cp /tmp/kcov-build/src/kcov /usr/local/bin/kcov

      - name: Build test binaries
        run: zig build emit-tests

      - name: Run tests under kcov
        run: |
          mkdir -p coverage
          for bin in zig-out/tests/*; do
            kcov --include-path="$(pwd)/src" --exclude-line=unreachable,@panic coverage/ "$bin" || true
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/kcov-merged/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcov-coverage
          path: coverage/kcov-merged/
          retention-days: 14

  # ── Resolve vendor matrix ──────────────────────────────────────────────────
  #
  # Queries the pinned omg-dds/dds-rtps release for *_shape_main_linux assets,
  # filters to the gated set (or all), and emits a JSON vendor matrix.
  # Runs in parallel with the self-interop jobs; vendor-interop jobs wait for both.

  setup-matrix:
    name: Resolve vendor matrix
    needs: test-linux
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - name: Build vendor matrix
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          VENDOR_FILTER: ${{ github.event_name == 'schedule' && 'all' || inputs.vendor_filter || 'default' }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          tag = os.environ['INTEROP_RELEASE_TAG']
          vendor_filter = os.environ.get('VENDOR_FILTER', 'default')

          # Asset-name prefixes included in the gated (default) CI set.
          # Extend when a new partner reaches a known-good interop state.
          DEFAULT_PREFIXES = [
              'connext_dds',
              'eclipse_cyclone',
              'eprosima_fastdds',
              'opendds',
          ]

          result = subprocess.run(
              ['gh', 'api', f'repos/omg-dds/dds-rtps/releases/tags/{tag}',
               '--jq', '[.assets[] | select(.name | endswith("_shape_main_linux.zip")) | .name]'],
              capture_output=True, text=True, check=True,
          )
          assets = json.loads(result.stdout)

          if vendor_filter != 'all':
              assets = [a for a in assets if any(a.startswith(p) for p in DEFAULT_PREFIXES)]

          if not assets:
              print('::error::No vendor binaries matched — check INTEROP_RELEASE_TAG and DEFAULT_PREFIXES', flush=True)
              sys.exit(1)

          matrix = [
              {'asset': a, 'binary': a[:-4], 'name': a.replace('_shape_main_linux.zip', '')}
              for a in assets
          ]
          print(f'Vendors ({vendor_filter}): {[m["name"] for m in matrix]}', flush=True)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={json.dumps(matrix)}\n')
          PYEOF

  # ── Interop: Zenzen DDS vs Zenzen DDS ─────────────────────────────────────
  #
  # Checkout layout (relative to $GITHUB_WORKSPACE):
  #   zzdds/      — this repo
  #   dds-rtps/   — zz-iot/dds-rtps fork at INTEROP_RTPS_REF
  #
  # The packages/zzdds symlink inside zzdds points four levels up:
  #   dds-rtps/srcZig/zzdds/packages/zzdds -> ../../../../zzdds
  # which resolves to $GITHUB_WORKSPACE/zzdds — exactly our checkout path.
  #
  # ubuntu-22.04: vendor prebuilt binaries require this image; use the same
  # runner here so the zzdds binary we upload is glibc-compatible with it.

  self-interop:
    name: self-interop (dds-rtps)
    needs: test-linux
    runs-on: ubuntu-22.04

    steps:
      - name: Check out zzdds
        uses: actions/checkout@v4
        with:
          path: zzdds

      - name: Check out dds-rtps (${{ env.INTEROP_RTPS_REF }})
        uses: actions/checkout@v4
        with:
          repository: zz-iot/dds-rtps
          ref: ${{ env.INTEROP_RTPS_REF }}
          path: dds-rtps

      - name: Wire packages/zzdds and packages/zidl symlinks
        run: |
          mkdir -p dds-rtps/srcZig/zzdds/packages
          ln -s ../../../../zzdds dds-rtps/srcZig/zzdds/packages/zzdds
          # Clone zidl at the same tag declared by the local zzdds checkout.
          ZIDL_TAG=$(grep -oP 'tags/\K[^"]+(?=\.tar\.gz)' \
            dds-rtps/srcZig/zzdds/packages/zzdds/build.zig.zon | head -1)
          git clone --depth=1 --branch "$ZIDL_TAG" \
            https://github.com/zz-iot/zidl.git zidl
          ln -s ../../../../zidl dds-rtps/srcZig/zzdds/packages/zidl
          # zig-pkg/ is gitignored so actions/checkout does not clean it between
          # runs on the same runner.  Stale URL-fetched packages shadow the path
          # deps above via fingerprint deduplication — wipe them first.
          rm -rf dds-rtps/srcZig/zzdds/zig-pkg/
          # Rewrite build.zig.zon to use the local path symlinks regardless of
          # what the branch has committed (URL or path).
          python3 - <<'PYEOF'
          import re
          path = 'dds-rtps/srcZig/zzdds/build.zig.zon'
          with open(path) as f:
              c = f.read()
          c = re.sub(r'\.zzdds\s*=\s*\.\{[^}]+\}',
                     '.zzdds = .{\n            .path = "packages/zzdds",\n        }', c)
          c = re.sub(r'\.zidl\s*=\s*\.\{[^}]+\}',
                     '.zidl = .{\n            .path = "packages/zidl",\n        }', c)
          with open(path, 'w') as f:
              f.write(c)
          print('build.zig.zon: zzdds and zidl rewritten to use local path symlinks')
          PYEOF

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install Python dependencies
        run: pip install pexpect junitparser

      - name: Build shape_main (ReleaseSafe)
        working-directory: dds-rtps/srcZig/zzdds
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

      - name: Upload zzdds binary (for vendor-interop jobs)
        uses: actions/upload-artifact@v4
        with:
          name: zzdds-shape-linux-normal
          path: dds-rtps/srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux
          retention-days: 1

      - name: Run self-interop suite
        working-directory: dds-rtps
        run: |
          python3 interoperability_report.py \
            -P srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux \
            -S srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux \
            -o /tmp/interop-results.xml

      - name: Check results
        run: python3 zzdds/scripts/check_interop_results.py /tmp/interop-results.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-results
          path: /tmp/interop-results.xml

  self-interop-tsan:
    name: self-interop (dds-rtps) + TSAN
    needs: test-linux
    runs-on: ubuntu-22.04

    steps:
      - name: Check out zzdds
        uses: actions/checkout@v4
        with:
          path: zzdds

      - name: Check out dds-rtps (${{ env.INTEROP_RTPS_REF }})
        uses: actions/checkout@v4
        with:
          repository: zz-iot/dds-rtps
          ref: ${{ env.INTEROP_RTPS_REF }}
          path: dds-rtps

      - name: Wire packages/zzdds and packages/zidl symlinks
        run: |
          mkdir -p dds-rtps/srcZig/zzdds/packages
          ln -s ../../../../zzdds dds-rtps/srcZig/zzdds/packages/zzdds
          ZIDL_TAG=$(grep -oP 'tags/\K[^"]+(?=\.tar\.gz)' \
            dds-rtps/srcZig/zzdds/packages/zzdds/build.zig.zon | head -1)
          git clone --depth=1 --branch "$ZIDL_TAG" \
            https://github.com/zz-iot/zidl.git zidl
          ln -s ../../../../zidl dds-rtps/srcZig/zzdds/packages/zidl
          rm -rf dds-rtps/srcZig/zzdds/zig-pkg/
          python3 - <<'PYEOF'
          import re
          path = 'dds-rtps/srcZig/zzdds/build.zig.zon'
          with open(path) as f:
              c = f.read()
          c = re.sub(r'\.zzdds\s*=\s*\.\{[^}]+\}',
                     '.zzdds = .{\n            .path = "packages/zzdds",\n        }', c)
          c = re.sub(r'\.zidl\s*=\s*\.\{[^}]+\}',
                     '.zidl = .{\n            .path = "packages/zidl",\n        }', c)
          with open(path, 'w') as f:
              f.write(c)
          print('build.zig.zon: zzdds and zidl rewritten to use local path symlinks')
          PYEOF

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install Python dependencies
        run: pip install pexpect junitparser

      - name: Build shape_main (Debug + ThreadSanitizer)
        working-directory: dds-rtps/srcZig/zzdds
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=Debug -Dlog-level=info -Dsanitize-thread

      - name: Upload zzdds binary (TSan, for vendor-interop-tsan jobs)
        uses: actions/upload-artifact@v4
        with:
          name: zzdds-shape-linux-tsan
          path: dds-rtps/srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux
          retention-days: 1

      - name: Run self-interop suite (TSan)
        working-directory: dds-rtps
        env:
          # TSAN writes its race report to stderr, which pexpect captures via
          # the pty — so the report ends up inside the JUnit XML failure message
          # and is displayed by check_interop_results.py below.
          # abort_on_error=1 kills the process on the first race, causing
          # pexpect to see an unexpected exit and mark the test as failed.
          TSAN_OPTIONS: abort_on_error=1
        run: |
          python3 interoperability_report.py \
            -P srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux \
            -S srcZig/zzdds/zig-out/bin/zzdds_shape_main_linux \
            -o /tmp/interop-tsan-results.xml

      - name: Check results
        run: python3 zzdds/scripts/check_interop_results.py /tmp/interop-tsan-results.xml

      - name: Upload TSan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-tsan-results
          path: /tmp/interop-tsan-results.xml

  # ── Interop: Zenzen DDS vs vendor (normal) ────────────────────────────────
  #
  # Matrix: vendor (dynamic, from pinned release) × direction (pub | sub)
  #   pub: zzdds publishes, vendor subscribes   (-P zzdds -S vendor)
  #   sub: vendor publishes, zzdds subscribes   (-P vendor -S zzdds)
  #
  # Each combination runs on its own runner so jobs are fully parallel and
  # there are no UDP port conflicts between vendors.
  #
  # Gated on self-interop so vendor jobs only start when zzdds is self-consistent.

  vendor-interop-normal:
    name: "${{ matrix.vendor.name }} / ${{ matrix.direction }}"
    needs: [setup-matrix, self-interop]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        vendor: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
        direction: [pub, sub]

    steps:
      - name: Check out zzdds
        uses: actions/checkout@v4
        with:
          path: zzdds

      - name: Check out dds-rtps (${{ env.INTEROP_RTPS_REF }})
        uses: actions/checkout@v4
        with:
          repository: zz-iot/dds-rtps
          ref: ${{ env.INTEROP_RTPS_REF }}
          path: dds-rtps

      - name: Install Python dependencies
        run: pip install pexpect junitparser

      - name: Download zzdds binary
        uses: actions/download-artifact@v4
        with:
          name: zzdds-shape-linux-normal
          path: bins/

      - name: Download vendor binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.INTEROP_RELEASE_TAG }} \
            --repo omg-dds/dds-rtps \
            --pattern "${{ matrix.vendor.asset }}" \
            -D bins/
          unzip -o bins/${{ matrix.vendor.asset }} -d bins/

      - name: Make binaries executable
        run: chmod +x bins/zzdds_shape_main_linux bins/${{ matrix.vendor.binary }}

      - name: Run interop (${{ matrix.direction }})
        working-directory: dds-rtps
        run: |
          ZZDDS="$GITHUB_WORKSPACE/bins/zzdds_shape_main_linux"
          VENDOR="$GITHUB_WORKSPACE/bins/${{ matrix.vendor.binary }}"
          if [ "${{ matrix.direction }}" = "pub" ]; then
            PUB="$ZZDDS"; SUB="$VENDOR"
          else
            PUB="$VENDOR"; SUB="$ZZDDS"
          fi
          python3 interoperability_report.py -P "$PUB" -S "$SUB" \
            -o /tmp/interop-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml

      - name: Check results
        run: |
          python3 zzdds/scripts/check_interop_results.py \
            /tmp/interop-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-${{ matrix.vendor.name }}-${{ matrix.direction }}
          path: /tmp/interop-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml

  # ── Interop: Zenzen DDS (TSan) vs vendor ──────────────────────────────────
  #
  # Same structure as vendor-interop-normal but uses the TSan-instrumented zzdds.
  # A race causes the process to abort (TSAN_OPTIONS=abort_on_error=1), which
  # pexpect sees as EOF; the test is marked failed and the TSAN report is embedded
  # in the JUnit failure message, surfaced by check_interop_results.py.
  #
  # Gated on self-interop-tsan, which itself must pass first.

  vendor-interop-tsan:
    name: "TSan: ${{ matrix.vendor.name }} / ${{ matrix.direction }}"
    needs: [setup-matrix, self-interop-tsan]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        vendor: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
        direction: [pub, sub]

    steps:
      - name: Check out zzdds
        uses: actions/checkout@v4
        with:
          path: zzdds

      - name: Check out dds-rtps (${{ env.INTEROP_RTPS_REF }})
        uses: actions/checkout@v4
        with:
          repository: zz-iot/dds-rtps
          ref: ${{ env.INTEROP_RTPS_REF }}
          path: dds-rtps

      - name: Install Python dependencies
        run: pip install pexpect junitparser

      - name: Download zzdds binary (TSan)
        uses: actions/download-artifact@v4
        with:
          name: zzdds-shape-linux-tsan
          path: bins/

      - name: Download vendor binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.INTEROP_RELEASE_TAG }} \
            --repo omg-dds/dds-rtps \
            --pattern "${{ matrix.vendor.asset }}" \
            -D bins/
          unzip -o bins/${{ matrix.vendor.asset }} -d bins/

      - name: Make binaries executable
        run: chmod +x bins/zzdds_shape_main_linux bins/${{ matrix.vendor.binary }}

      - name: Run interop TSan (${{ matrix.direction }})
        working-directory: dds-rtps
        env:
          TSAN_OPTIONS: abort_on_error=1
        run: |
          ZZDDS="$GITHUB_WORKSPACE/bins/zzdds_shape_main_linux"
          VENDOR="$GITHUB_WORKSPACE/bins/${{ matrix.vendor.binary }}"
          if [ "${{ matrix.direction }}" = "pub" ]; then
            PUB="$ZZDDS"; SUB="$VENDOR"
          else
            PUB="$VENDOR"; SUB="$ZZDDS"
          fi
          python3 interoperability_report.py -P "$PUB" -S "$SUB" \
            -o /tmp/interop-tsan-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml

      - name: Check results
        run: |
          python3 zzdds/scripts/check_interop_results.py \
            /tmp/interop-tsan-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml

      - name: Upload TSan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-tsan-${{ matrix.vendor.name }}-${{ matrix.direction }}
          path: /tmp/interop-tsan-${{ matrix.vendor.name }}-${{ matrix.direction }}.xml
