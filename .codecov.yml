coverage:
  status:
    project:
      default:
        # Don't fail PRs on coverage drop until a baseline is established.
        informational: true
    patch:
      default:
        informational: true

ignore:
  # Pure sentinel/noop vtable stubs — correct by construction, never called in tests
  # by design (nil entities are never dispatched through).
  - "src/dcps/nil.zig"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
